<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
  <meta name="theme-color" content="#0D1117" />
  <meta name="description" content="ELTECH Personality - App de treino personalizado. Funciona offline." />
  <title>ELTECH Personality</title>
  <link rel="manifest" href="./manifest.json" />
  <link rel="icon" href="./assets/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="./assets/icon.svg" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Personality" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <div class="bg-image"></div>
  <div id="app"><div class="screen center" style="padding-top:80px"><p class="muted">Carregando…</p></div></div>
  <div id="toast"></div>
  <div id="modal-root"></div>

  <script src="./js/db.js"></script>
  <script src="./js/auth.js"></script>
  <script src="./js/excel.js"></script>
  <script src="./js/app.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js").catch((e) =>
          console.warn("SW não registrado:", e)
        );
      });
    }
  </script>
</body>
</html>
